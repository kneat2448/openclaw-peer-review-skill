<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peer Review Dashboard</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f3f4f6; }
    body { margin: 0; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px 20px; }
    .hero, .card { background: white; border: 1px solid #e5e7eb; border-radius: 18px; box-shadow: 0 8px 30px rgba(15,23,42,.06); }
    .hero { padding: 28px; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    h2 { margin: 0 0 14px; font-size: 20px; }
    p { color: #4b5563; line-height: 1.55; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
    .metric { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; }
    .metric strong { display: block; font-size: 28px; color: #111827; }
    .card { padding: 22px; margin: 16px 0; }
    .scores { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .score { background: #eef2ff; color: #3730a3; border-radius: 12px; padding: 12px; }
    .risk-Low { color: #047857; }
    .risk-Medium { color: #b45309; }
    .risk-High { color: #b91c1c; }
    .muted { color: #6b7280; }
    .error { color: #b91c1c; background: #fee2e2; padding: 16px; border-radius: 12px; }
  </style>
</head>
<body>
  <main id="app">Loading dashboard…</main>
  <script>
    const projectId = location.pathname.split('/').filter(Boolean).pop();
    const app = document.getElementById('app');
    const esc = (v) => String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    fetch(`/api/dashboard/${projectId}`)
      .then(r => r.ok ? r.json() : Promise.reject(new Error('Dashboard data not found')))
      .then(data => render(data))
      .catch(err => { app.innerHTML = `<div class="error">${esc(err.message)}</div>`; });

    function render(data) {
      const p = data.project;
      app.innerHTML = `
        <section class="hero">
          <div class="muted">Project ID: ${esc(p.project_id)}</div>
          <h1>${esc(p.project_name)}</h1>
          <p>${esc(p.project_brief || 'No brief provided.')}</p>
          <p><strong>Expectations:</strong> ${esc(p.project_expectations || 'Not specified.')}</p>
          <p class="muted">Sensitive contracts/offers/terms are intentionally excluded from this dashboard.</p>
          <div class="grid">
            <div class="metric"><span>Team size</span><strong>${esc(data.metrics.team_size)}</strong></div>
            <div class="metric"><span>Responses</span><strong>${esc(data.metrics.response_count)}</strong></div>
            <div class="metric"><span>Average score</span><strong>${esc(data.metrics.average_final_score)}/10</strong></div>
            <div class="metric"><span>Status</span><strong style="font-size:20px">${esc(p.status)}</strong></div>
          </div>
        </section>
        ${data.results?.length ? data.results.map(resultCard).join('') : '<section class="card"><h2>No results yet</h2><p>Submit reviews, then run “analyze reviews” in Telegram.</p></section>'}
      `;
    }

    function scoreCell(label, val, hasResponses) {
      const display = hasResponses ? `${esc(val)}/10` : '<span class="muted">No responses</span>';
      return `<div class="score">${esc(label)}<br><strong>${display}</strong></div>`;
    }

    function resultCard(r) {
      const hasResponses = (r.response_count ?? 0) > 0;
      return `
        <section class="card">
          <h2>${esc(r.name || r.reviewee_user_id)} <span class="muted">— ${esc(r.role || '')}</span></h2>
          ${!hasResponses ? '<p style="color:#b45309">No review responses received yet.</p>' : ''}
          <p><strong>Risk:</strong> <span class="risk-${esc(r.risk_level)}">${esc(r.risk_level)}</span></p>
          <div class="scores">
            ${scoreCell('Final', r.final_score, hasResponses)}
            ${scoreCell('Communication', r.communication_score, hasResponses)}
            ${scoreCell('Execution', r.execution_score, hasResponses)}
            ${scoreCell('Collaboration', r.collaboration_score, hasResponses)}
          </div>
          <p><strong>Summary:</strong> ${esc(r.summary)}</p>
          <p><strong>Expectation fit:</strong> ${esc(r.expectation_fit || '')}</p>
          <p><strong>Strengths:</strong> ${esc(r.strengths)}</p>
          <p><strong>Improvements:</strong> ${esc(r.improvements)}</p>
          <p class="muted">Responses used: ${esc(r.response_count ?? 0)}</p>
        </section>`;
    }
  </script>
</body>
</html>
